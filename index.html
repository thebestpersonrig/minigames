<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>

  <style>
    :root {
      --bg-1: #5b7cfa;
      --bg-2: #7d4fd4;
      --panel: rgba(255, 255, 255, 0.12);
      --panel-strong: rgba(255, 255, 255, 0.18);
      --text: #ffffff;
      --text-dark: #23304a;
      --muted: rgba(255, 255, 255, 0.82);
      --accent: #7ef0c5;
      --accent-2: #ffd166;
      --button: #49b96e;
      --button-hover: #3ca35f;
      --radius: 22px;
      --shadow: 0 18px 40px rgba(12, 20, 44, 0.26);
      --board-max: min(82vw, 52vh, 360px);
      --gap: 12px;
      --cell-size: calc((var(--board-max) - (var(--gap) * 2)) / 3);
      --title-size: clamp(2rem, 4vw, 2.8rem);
      --status-size: clamp(1rem, 2.2vw, 1.18rem);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.18), transparent 26%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.12), transparent 22%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 14px;
      overflow: hidden;
    }

    .app {
      width: min(100%, 560px);
      height: min(100dvh - 28px, 920px);
      max-height: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .screen {
      position: absolute;
      inset: 0;
      padding: 18px;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .setup-screen {
      justify-content: center;
      gap: 14px;
    }

    .game-screen {
      justify-content: space-between;
      gap: 10px;
    }

    .top {
      display: grid;
      gap: 8px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: var(--title-size);
      line-height: 1.05;
      letter-spacing: 0.02em;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.22);
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      padding: 14px;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option-row {
      display: grid;
      gap: 8px;
    }

    .option-label {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .segmented {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .segmented input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .segmented label {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.12);
      cursor: pointer;
      font-size: 0.94rem;
      transition: 0.18s ease;
      user-select: none;
      touch-action: manipulation;
      text-align: center;
    }

    .segmented label:hover {
      background: rgba(255, 255, 255, 0.16);
      transform: translateY(-1px);
    }

    .segmented input:checked + label {
      background: rgba(255, 255, 255, 0.95);
      color: var(--text-dark);
      border-color: transparent;
      font-weight: 700;
    }

    .primary-action {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      background: var(--button);
      color: white;
      box-shadow: 0 12px 24px rgba(20, 26, 48, 0.2);
      transition: 0.2s ease;
      touch-action: manipulation;
    }

    .primary-action:hover {
      background: var(--button-hover);
      transform: translateY(-2px);
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .score-card {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 10px 8px;
      text-align: center;
    }

    .score-card strong {
      display: block;
      font-size: 1.28rem;
      margin-top: 4px;
    }

    .game-header {
      display: grid;
      gap: 8px;
      text-align: center;
    }

    .game-title {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2rem);
      line-height: 1.08;
    }

    .meta {
      color: var(--muted);
      font-size: 0.9rem;
      min-height: 1.2em;
    }

    .status {
      min-height: 1.4em;
      text-align: center;
      font-size: var(--status-size);
      font-weight: 700;
      margin: 0;
    }

    .board-area {
      display: flex;
      flex: 1;
      min-height: 0;
      justify-content: center;
      align-items: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, var(--cell-size));
      gap: var(--gap);
    }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      border: none;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.94);
      color: var(--text-dark);
      font-size: calc(var(--cell-size) * 0.42);
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(16, 24, 48, 0.18);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .cell:hover:not(:disabled),
    .cell:focus-visible:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 14px 28px rgba(16, 24, 48, 0.26);
      background: #ffffff;
      outline: none;
    }

    .cell:disabled {
      cursor: not-allowed;
    }

    .cell.x {
      color: #4961d6;
    }

    .cell.o {
      color: #da5f7a;
    }

    .cell.winning {
      background: linear-gradient(135deg, #ffe38a, #ffd166);
      animation: pulse 0.7s ease-in-out infinite alternate;
    }

    .controls {
      display: grid;
      gap: 8px;
    }

    .controls button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 8px 18px rgba(20, 26, 48, 0.18);
      touch-action: manipulation;
    }

    .btn-primary {
      background: var(--button);
      color: white;
    }

    .btn-primary:hover {
      background: var(--button-hover);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.94);
      color: var(--text-dark);
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
    }

    .btn-tertiary {
      background: rgba(255, 255, 255, 0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.14);
    }

    .btn-tertiary:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-2px);
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.04); }
    }

    @media (max-width: 700px) {
      :root {
        --board-max: min(88vw, 48vh, 320px);
        --gap: 10px;
      }

      .app {
        width: min(100%, 500px);
        height: min(100dvh - 20px, 860px);
      }

      .screen {
        padding: 14px;
      }
    }

    @media (max-width: 480px) {
      :root {
        --board-max: min(92vw, 44vh, 285px);
        --gap: 8px;
      }

      body {
        padding: 10px;
      }

      .app {
        width: 100%;
        height: min(100dvh - 20px, 820px);
        border-radius: 24px;
      }

      .subtitle,
      .meta {
        font-size: 0.88rem;
      }

      .segmented {
        justify-content: center;
      }

      .segmented label {
        font-size: 0.9rem;
        padding: 7px 10px;
      }
    }

    @media (max-width: 380px) {
      :root {
        --board-max: min(92vw, 40vh, 245px);
        --gap: 7px;
      }

      .scoreboard {
        grid-template-columns: 1fr;
      }

      .segmented {
        flex-direction: column;
      }

      .segmented label {
        width: 100%;
      }
    }

    @media (max-height: 720px) {
      :root {
        --board-max: min(84vw, 42vh, 270px);
      }

      .screen {
        padding: 12px;
      }

      h1 {
        font-size: clamp(1.6rem, 4.2vw, 2.1rem);
      }

      .subtitle {
        display: none;
      }
    }

    @media (max-height: 620px) {
      :root {
        --board-max: min(78vw, 36vh, 220px);
      }

      .app {
        height: min(100dvh - 12px, 760px);
      }

      .game-header {
        gap: 4px;
      }

      .score-card {
        padding: 8px 6px;
      }

      .controls button {
        padding: 9px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="screen setup-screen active" id="setupScreen">
      <div class="top">
        <h1>Tic-Tac-Toe</h1>
        <p class="subtitle">Choose your setup first, then play on a clean game screen with no scrolling.</p>
      </div>

      <div class="panel options" aria-label="Game settings">
        <div class="option-row">
          <div class="option-label">Mode</div>
          <div class="segmented">
            <input type="radio" id="modeSingle" name="mode" value="single" checked>
            <label for="modeSingle">Single Player</label>

            <input type="radio" id="modeMulti" name="mode" value="multi">
            <label for="modeMulti">Multiplayer</label>
          </div>
        </div>

        <div class="option-row">
          <div class="option-label">Difficulty</div>
          <div class="segmented" id="difficultyGroup">
            <input type="radio" id="difficultyEasy" name="difficulty" value="easy">
            <label for="difficultyEasy">Easy</label>

            <input type="radio" id="difficultyMedium" name="difficulty" value="medium" checked>
            <label for="difficultyMedium">Medium</label>

            <input type="radio" id="difficultyHard" name="difficulty" value="hard">
            <label for="difficultyHard">Impossible</label>
          </div>
        </div>

        <div class="option-row">
          <div class="option-label">First turn</div>
          <div class="segmented">
            <input type="radio" id="firstHuman" name="firstTurn" value="human" checked>
            <label for="firstHuman">You / X</label>

            <input type="radio" id="firstComputer" name="firstTurn" value="computer">
            <label for="firstComputer">Computer / O</label>
          </div>
        </div>
      </div>

      <button class="primary-action" id="startGameBtn" type="button">Start Game</button>
    </section>

    <section class="screen game-screen" id="gameScreen">
      <div class="game-header">
        <h2 class="game-title">Tic-Tac-Toe</h2>
        <div class="meta" id="gameMeta"></div>
      </div>

      <div class="scoreboard" aria-label="Scoreboard">
        <div class="score-card">
          <div id="scoreLabelX">Player X</div>
          <strong id="scoreX">0</strong>
        </div>
        <div class="score-card">
          <div>Ties</div>
          <strong id="scoreTies">0</strong>
        </div>
        <div class="score-card">
          <div id="scoreLabelO">Player O</div>
          <strong id="scoreO">0</strong>
        </div>
      </div>

      <p class="status" id="status" aria-live="polite"></p>

      <div class="board-area">
        <div class="grid" id="grid" role="grid" aria-label="Tic Tac Toe board"></div>
      </div>

      <div class="controls">
        <button class="btn-primary" id="restartSameBtn" type="button">Restart Same Settings</button>
        <button class="btn-secondary" id="changeSettingsBtn" type="button">Change Settings</button>
        <button class="btn-tertiary" id="resetScoresBtn" type="button">Reset Scores</button>
      </div>
    </section>
  </main>

  <script>
    const WINNING_LINES = [
      [0, 1, 2],
      [3, 4, 5],
      [6, 7, 8],
      [0, 3, 6],
      [1, 4, 7],
      [2, 5, 8],
      [0, 4, 8],
      [2, 4, 6]
    ];

    const MOVE_PRIORITY = [4, 0, 2, 6, 8, 1, 3, 5, 7];

    const state = {
      board: Array(9).fill(""),
      currentPlayer: "X",
      gameOver: false,
      winningLine: null,
      isComputerThinking: false,
      scores: { X: 0, O: 0, ties: 0 },
      settings: {
        mode: "single",
        difficulty: "medium",
        firstTurn: "human"
      }
    };

    const elements = {
      setupScreen: document.getElementById("setupScreen"),
      gameScreen: document.getElementById("gameScreen"),
      startGameBtn: document.getElementById("startGameBtn"),
      restartSameBtn: document.getElementById("restartSameBtn"),
      changeSettingsBtn: document.getElementById("changeSettingsBtn"),
      resetScoresBtn: document.getElementById("resetScoresBtn"),
      grid: document.getElementById("grid"),
      status: document.getElementById("status"),
      gameMeta: document.getElementById("gameMeta"),
      scoreX: document.getElementById("scoreX"),
      scoreO: document.getElementById("scoreO"),
      scoreTies: document.getElementById("scoreTies"),
      scoreLabelX: document.getElementById("scoreLabelX"),
      scoreLabelO: document.getElementById("scoreLabelO"),
      modeInputs: document.querySelectorAll('input[name="mode"]'),
      difficultyInputs: document.querySelectorAll('input[name="difficulty"]'),
      firstTurnInputs: document.querySelectorAll('input[name="firstTurn"]'),
      difficultyGroup: document.getElementById("difficultyGroup")
    };

    const cells = [];

    function createBoard() {
      for (let i = 0; i < 9; i += 1) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "cell";
        button.setAttribute("role", "gridcell");
        button.setAttribute("aria-label", `Cell ${i + 1}`);
        button.dataset.index = i;
        button.addEventListener("click", () => handleCellClick(i));
        elements.grid.appendChild(button);
        cells.push(button);
      }
    }

    function showScreen(name) {
      elements.setupScreen.classList.toggle("active", name === "setup");
      elements.gameScreen.classList.toggle("active", name === "game");
    }

    function getInputValue(name) {
      return document.querySelector(`input[name="${name}"]:checked`).value;
    }

    function syncSettingsFromInputs() {
      state.settings.mode = getInputValue("mode");
      state.settings.difficulty = getInputValue("difficulty");
      state.settings.firstTurn = getInputValue("firstTurn");
    }

    function refreshSettingsUI() {
      const isSingle = getInputValue("mode") === "single";

      elements.difficultyInputs.forEach(input => {
        input.disabled = !isSingle;
      });

      document.querySelector('label[for="firstHuman"]').textContent = isSingle ? "You / X" : "Player X";
      document.querySelector('label[for="firstComputer"]').textContent = isSingle ? "Computer / O" : "Player O";
      elements.difficultyGroup.style.opacity = isSingle ? "1" : "0.55";
    }

    function getAvailableMoves(board = state.board) {
      return board.reduce((moves, cell, index) => {
        if (cell === "") moves.push(index);
        return moves;
      }, []);
    }

    function evaluateBoard(board = state.board) {
      for (const line of WINNING_LINES) {
        const [a, b, c] = line;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line };
        }
      }

      if (board.every(cell => cell !== "")) {
        return { winner: "Tie", line: null };
      }

      return { winner: null, line: null };
    }

    function preferredMoveOrder(moves) {
      return [...moves].sort((a, b) => MOVE_PRIORITY.indexOf(a) - MOVE_PRIORITY.indexOf(b));
    }

    function findImmediateMove(symbol, board = state.board) {
      const moves = preferredMoveOrder(getAvailableMoves(board));
      for (const move of moves) {
        const nextBoard = [...board];
        nextBoard[move] = symbol;
        if (evaluateBoard(nextBoard).winner === symbol) {
          return move;
        }
      }
      return null;
    }

    function minimax(board, currentSymbol, depth = 0) {
      const result = evaluateBoard(board);

      if (result.winner === "O") return { score: 10 - depth, move: null };
      if (result.winner === "X") return { score: depth - 10, move: null };
      if (result.winner === "Tie") return { score: 0, move: null };

      const maximizing = currentSymbol === "O";
      let bestScore = maximizing ? -Infinity : Infinity;
      let bestMove = null;

      for (const move of preferredMoveOrder(getAvailableMoves(board))) {
        const nextBoard = [...board];
        nextBoard[move] = currentSymbol;
        const resultNext = minimax(nextBoard, currentSymbol === "X" ? "O" : "X", depth + 1);

        if (maximizing) {
          if (resultNext.score > bestScore) {
            bestScore = resultNext.score;
            bestMove = move;
          }
        } else {
          if (resultNext.score < bestScore) {
            bestScore = resultNext.score;
            bestMove = move;
          }
        }
      }

      return { score: bestScore, move: bestMove };
    }

    function randomChoice(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function getComputerMove() {
      const available = preferredMoveOrder(getAvailableMoves());
      if (!available.length) return null;

      const difficulty = state.settings.difficulty;

      if (difficulty === "easy") {
        const win = findImmediateMove("O");
        if (win !== null && Math.random() < 0.75) return win;
        if (Math.random() < 0.65) return randomChoice(available);
        const block = findImmediateMove("X");
        if (block !== null) return block;
        return randomChoice(available);
      }

      if (difficulty === "medium") {
        const win = findImmediateMove("O");
        if (win !== null) return win;

        const block = findImmediateMove("X");
        if (block !== null && Math.random() < 0.9) return block;

        if (Math.random() < 0.3) return randomChoice(available);
        return minimax([...state.board], "O").move;
      }

      return minimax([...state.board], "O").move;
    }

    function setStatus(message) {
      elements.status.textContent = message;
    }

    function updateMeta() {
      const { mode, difficulty, firstTurn } = state.settings;
      if (mode === "single") {
        elements.gameMeta.textContent = `Single Player • ${difficulty[0].toUpperCase() + difficulty.slice(1)} • ${firstTurn === "human" ? "You start" : "Computer starts"}`;
        elements.scoreLabelX.textContent = "You";
        elements.scoreLabelO.textContent = "Computer";
      } else {
        elements.gameMeta.textContent = `Multiplayer • ${firstTurn === "human" ? "Player X starts" : "Player O starts"}`;
        elements.scoreLabelX.textContent = "Player X";
        elements.scoreLabelO.textContent = "Player O";
      }
    }

    function renderScores() {
      elements.scoreX.textContent = state.scores.X;
      elements.scoreO.textContent = state.scores.O;
      elements.scoreTies.textContent = state.scores.ties;
    }

    function renderBoard() {
      cells.forEach((cell, index) => {
        const value = state.board[index];
        const isWinning = state.winningLine && state.winningLine.includes(index);
        const disabled = state.gameOver || state.isComputerThinking || value !== "";

        cell.textContent = value;
        cell.disabled = disabled;
        cell.classList.toggle("x", value === "X");
        cell.classList.toggle("o", value === "O");
        cell.classList.toggle("winning", Boolean(isWinning));
        cell.setAttribute("aria-label", value ? `${value} in cell ${index + 1}` : `Empty cell ${index + 1}`);
      });
    }

    function updateTurnStatus() {
      if (state.gameOver) return;

      if (state.settings.mode === "multi") {
        setStatus(`Player ${state.currentPlayer}'s turn.`);
      } else if (state.currentPlayer === "X") {
        setStatus("Your turn.");
      } else {
        setStatus("Computer is thinking...");
      }
    }

    function applyMove(index, symbol) {
      if (state.board[index] !== "" || state.gameOver) return false;
      state.board[index] = symbol;
      return true;
    }

    function finishRound(winner, line) {
      state.gameOver = true;
      state.winningLine = line;

      if (winner === "Tie") {
        state.scores.ties += 1;
        setStatus("It's a tie.");
      } else {
        state.scores[winner] += 1;
        if (state.settings.mode === "single") {
          setStatus(winner === "X" ? "You win." : "Computer wins.");
        } else {
          setStatus(`Player ${winner} wins.`);
        }
      }

      renderScores();
      renderBoard();
    }

    function checkRoundState() {
      const { winner, line } = evaluateBoard();
      if (!winner) return false;
      finishRound(winner, line);
      return true;
    }

    function triggerComputerTurn() {
      if (state.settings.mode !== "single" || state.gameOver || state.currentPlayer !== "O") return;

      state.isComputerThinking = true;
      renderBoard();
      updateTurnStatus();

      const delay = state.board.filter(Boolean).length <= 1 ? 380 : 240;

      setTimeout(() => {
        const move = getComputerMove();
        state.isComputerThinking = false;

        if (move === null || state.gameOver) {
          renderBoard();
          return;
        }

        applyMove(move, "O");
        renderBoard();

        if (checkRoundState()) return;

        state.currentPlayer = "X";
        updateTurnStatus();
        renderBoard();
      }, delay);
    }

    function handleCellClick(index) {
      if (state.gameOver || state.isComputerThinking) return;
      if (state.board[index] !== "") return;

      applyMove(index, state.currentPlayer);
      renderBoard();

      if (checkRoundState()) return;

      state.currentPlayer = state.currentPlayer === "X" ? "O" : "X";
      updateTurnStatus();
      renderBoard();

      if (state.settings.mode === "single" && state.currentPlayer === "O") {
        triggerComputerTurn();
      }
    }

    function resetBoard() {
      state.board = Array(9).fill("");
      state.gameOver = false;
      state.winningLine = null;
      state.isComputerThinking = false;
      state.currentPlayer = state.settings.firstTurn === "computer" ? "O" : "X";
      renderBoard();
      updateMeta();
      updateTurnStatus();

      if (state.settings.mode === "single" && state.currentPlayer === "O") {
        triggerComputerTurn();
      }
    }

    function startGameFromSettings() {
      syncSettingsFromInputs();
      updateMeta();
      renderScores();
      showScreen("game");
      resetBoard();
    }

    function changeSettings() {
      state.isComputerThinking = false;
      showScreen("setup");
      refreshSettingsUI();
    }

    function resetScores() {
      state.scores = { X: 0, O: 0, ties: 0 };
      renderScores();
    }

    function attachListeners() {
      [...elements.modeInputs, ...elements.difficultyInputs, ...elements.firstTurnInputs].forEach(input => {
        input.addEventListener("change", refreshSettingsUI);
      });

      elements.startGameBtn.addEventListener("click", startGameFromSettings);
      elements.restartSameBtn.addEventListener("click", resetBoard);
      elements.changeSettingsBtn.addEventListener("click", changeSettings);
      elements.resetScoresBtn.addEventListener("click", resetScores);
    }

    createBoard();
    attachListeners();
    refreshSettingsUI();
    renderScores();
  </script>
</body>
</html>
